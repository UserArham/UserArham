<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arham | NanoTech Code</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .profile-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px 20px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid #30363d;
            margin: 0 auto 20px;
            display: block;
            object-fit: cover;
        }
        h1 { margin: 10px 0 5px; color: #f0f6fc; font-size: 24px; }
        .username { color: #8b949e; margin-bottom: 20px; font-size: 16px; }
        .bio { font-size: 14px; line-height: 1.5; margin-bottom: 25px; color: #8b949e; }
        .btn {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
            transition: 0.2s;
        }
        .btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <img src="https://avatars.githubusercontent.com/u/241672494?v=4" alt="Arham Avatar" class="avatar">
    
    <h1>Arham</h1>
    <p class="username">UserArham • he/him</p>
    
    <div class="bio">
        Founding moderator of <strong>NanoTech Code</strong>. 
        NanoTech is an epic coding system built by community moderators.
    </div>

    <a href="https://github.com" class="btn" target="_blank">View GitHub Profile</a>
</div>

</body>
</html>
